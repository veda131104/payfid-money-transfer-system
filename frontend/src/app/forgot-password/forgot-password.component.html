<section class="login-shell">
  <div class="login-grid">
    <div class="login-panel">
      <mat-card class="card">
        <header class="card-header">
          <h1>Forgot password</h1>
          <p>Enter your username and we'll email a password reset link to the registered address.</p>
        </header>

        <form class="form" [formGroup]="form" (ngSubmit)="submit()">
          <mat-form-field appearance="outline" class="field">
            <mat-label>Username</mat-label>
            <input matInput type="text" placeholder="Enter your username" formControlName="name" />
            <mat-error *ngIf="form.get('name')?.hasError('required')">Username is required</mat-error>
            <mat-error *ngIf="form.get('name')?.hasError('minlength')">Must be at least 3 characters</mat-error>
          </mat-form-field>

          <button class="primary" type="submit" mat-flat-button [disabled]="isSending">Send reset link</button>
          <button class="link" type="button" mat-button routerLink="/">Back to sign in</button>
        </form>
      </mat-card>
    </div>
  </div>
</section>
