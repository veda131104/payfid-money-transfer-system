spring.profiles.active=test
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

spring.sql.init.mode=never

snowflake.url=jdbc:snowflake://test.url
snowflake.user=test
snowflake.password=test

app.jwt.secret=TestSecretKeyForJWTTokenGenerationInTestEnvironment2024
app.jwt.expiration=86400000
